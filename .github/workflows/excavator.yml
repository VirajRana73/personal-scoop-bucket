name: Excavator

on:
  workflow_dispatch:
  schedule:
  # Runs 4 times daily at 07:00 AM, 01:00 PM, 07:00 PM, 01:00 AM IST
  - cron: '30 19,1,7,13 * * *'
permissions:
  contents: write

jobs:
  excavate:
    name: Excavate
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Excavate
        uses: ScoopInstaller/GithubActions@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_UPDATED: 1
